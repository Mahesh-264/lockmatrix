<!DOCTYPE html>
<html>
<head>
    <title>Mahesh’s LockMatrix</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/script.js">
</head>
<body>

<div class="container">
    <div class="logo-container">
    <img src="https://img.icons8.com/3d-fluency/94/000000/lock.png" alt="Mahesh’s LockMatrix Logo" class="logo-img">
    <h2>Mahesh’s LockMatrix</h2>
</div>
    <label>Username</label>
    <input type="text" id="username" placeholder="Enter username">

    <label>Password Type</label>
    <select id="type">
        <option value="numeric">Numeric</option>
        <option value="string">Alphabetic</option>
        <option value="mixed">Mixed</option>
    </select>

    <label>Password Length</label>
    <input type="number" id="length" value="10" min="6" max="30">

    <button onclick="generatePassword()">Generate Password</button>

    <div class="result-box">
        <input type="text" id="result" readonly>
    </div>

    <h3>Saved Passwords</h3>
    <ul id="savedPasswords"></ul>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
